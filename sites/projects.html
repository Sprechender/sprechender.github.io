<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css" />
    <title>projects ● marcel schreiber</title>
    <style>
        body {
            background-color: #09131E;
            /* Dark background color */
            color: #E0E1DD;
            /* Light text color */
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            /* Change to column */
            align-items: center;
            justify-content: center;
            height: 100vh;
            transition: all 0.5s;
            /* Added for smoother transition */
        }

        h1 {
            font-size: 2em;
            margin-bottom: 20px;
            text-align: center;
        }

        .menu-container {
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .hoverable {
            font-size: 1.5em;
            cursor: pointer;
            position: relative;
            display: inline-block;
            margin: 10px 0;
            /* Adjust the margin as needed */
        }

        .hoverable::after {
            content: '';
            position: absolute;
            width: 0;
            height: 2px;
            background-color: #778DA9;
            /* Initial underline color */
            bottom: 0;
            left: 0;
            transition: width 0.3s ease-in-out;
        }

        .hoverable:hover::after {
            width: 100%;
            /* Underline fully expands on hover */
        }

        .hoverFade {
            color: #415A77;
            transition: 0.2s ease-in-out;
        }

        .hoverFade:hover {
            color: #778DA9;
        }
    </style>
</head>

<body class="mbod">

    <div>
        <h1>
            projects
        </h1>
    </div>

    <div class="menu-container">
        
    </div>
        <p onclick='loadPage("home")' class="hoverable">
            <span class="hoverFade">
                back
            </span>
        </p>
    </div>
    <script>
        function loadPage(site) {
            switch (site) {
                case "home":
                    window.location.href = "../index.html";
                    break;
            }
        }
    </script>
</body>

</html>
